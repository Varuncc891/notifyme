version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: notifyflow-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifyflow

    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: notifyflow-redis
    restart: always

    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile

    container_name: notifyflow-api

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notifyflow

    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.worker

    container_name: notifyflow-worker

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notifyflow

    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile

    container_name: notifyflow-web

    ports:
      - "5173:5173"

    depends_on:
      - api